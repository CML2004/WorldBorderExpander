name: WorldBorderExpander
version: 2.0.0
main: com.worldborderexpander.WorldBorderExpander
api-version: 1.21
description: Dynamic world border — grows daily, shrinks on death, expandable with XP.
author: YourName

commands:
  bordershop:
    description: Open the World Border XP shop.
    usage: /bordershop
    aliases: [bs, borderbuy]
  border:
    description: Admin commands for WorldBorderExpander.
    usage: /border <status|reload|reset|set|growth|penalty|afk>

permissions:
  wbe.use:
    description: Open and use the border XP shop.
    default: true
  wbe.admin:
    description: Access all /border admin commands.
    default: op
